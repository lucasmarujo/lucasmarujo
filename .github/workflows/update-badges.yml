name: Update Badges

on:
  schedule:
    # 11h no horário de Brasília (UTC-3) = 14h UTC
    - cron: "0 14 * * *"
  workflow_dispatch: # Allow manual runs

jobs:
  update-badges:
    name: Update README with Credly Badges
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Update Badges
        uses: pemtajo/badge-readme@main
        with:
          CREDLY_USER: lucas-marujo-amadeu # Seu username do Credly (credly.com/users/<username>)
          NUMBER_LAST_BADGES: 10 # Show last 10 badges (0 = all)